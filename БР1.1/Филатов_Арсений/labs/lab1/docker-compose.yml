services:
  postgres:
    image: postgres:16
    container_name: lab1_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lab1
      POSTGRES_USER: lab1_user
      POSTGRES_PASSWORD: lab1_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
